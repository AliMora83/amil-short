let current=0;

function renderScene(idx){
  const s=scenes[idx];
  document.getElementById('sceneCanvas').innerHTML=`<div class="scene-num">Scene ${String(idx+1).padStart(2,'0')} / 09</div>${s.svg}`;
  document.getElementById('sceneName').innerHTML=`The <em>${s.title}</em>`;
  document.getElementById('sceneDur').textContent=`Duration: ${s.duration}`;
  document.getElementById('voText').textContent=s.vo;
  document.getElementById('visualNote').textContent=s.visual;
  document.getElementById('accentStrip').innerHTML=s.accents.map(a=>`<div class="accent-dot" style="background:${a.color}"></div><div class="accent-label">${a.label}</div>`).join('<div style="width:0.8rem"></div>');
  document.querySelectorAll('.progress-seg').forEach((el,i)=>{el.classList.remove('active','done');if(i===idx)el.classList.add('active');else if(i<idx)el.classList.add('done');});
  document.querySelectorAll('.thumb').forEach((el,i)=>el.classList.toggle('active',i===idx));
  document.getElementById('btnPrev').disabled=idx===0;
  document.getElementById('btnNext').disabled=idx===scenes.length-1;
  document.getElementById('navCount').textContent=`${idx+1} of ${scenes.length} scenes`;
  current=idx;
}

function navigate(dir){const n=current+dir;if(n>=0&&n<scenes.length)renderScene(n);}

const pb=document.getElementById('progressBar');
scenes.forEach((_,i)=>{const seg=document.createElement('div');seg.className='progress-seg';seg.setAttribute('data-n',String(i+1).padStart(2,'0'));seg.onclick=()=>renderScene(i);pb.appendChild(seg);});

const strip=document.getElementById('stripInner');
scenes.forEach((s,i)=>{const t=document.createElement('div');t.className='thumb';t.innerHTML=`<div class="thumb-canvas">${s.thumbSvg}</div><div class="thumb-label">${String(i+1).padStart(2,'0')} — ${s.title}</div>`;t.onclick=()=>renderScene(i);strip.appendChild(t);});

renderScene(0);
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')navigate(1);if(e.key==='ArrowLeft')navigate(-1);});
</script>
</body>
</html>
